<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Tripod Base -->
    <path d="M 380 450 L 320 580" fill="none" stroke="#4b5563" stroke-width="25" stroke-linecap="round" />
    <path d="M 420 450 L 480 580" fill="none" stroke="#4b5563" stroke-width="25" stroke-linecap="round" />
    <path d="M 400 450 L 400 580" fill="none" stroke="#374151" stroke-width="25" stroke-linecap="round" />
    
    <!-- Camera Body -->
    <rect x="250" y="250" width="300" height="200" rx="40" fill="url(#grad1)" />
    
    <!-- Lens Mount -->
    <circle cx="400" cy="350" r="90" fill="#1f2937" />
    <circle cx="400" cy="350" r="70" fill="#374151" />
    
    <!-- Glass Element -->
    <circle cx="400" cy="350" r="50" fill="url(#grad2)" />
    <!-- Reflections -->
    <circle cx="415" cy="330" r="15" fill="#fff" opacity="0.8" />
    <circle cx="380" cy="370" r="8" fill="#fff" opacity="0.4" />
    
    <!-- Flash/Light Panel -->
    <rect x="330" y="160" width="140" height="70" rx="15" fill="#9ca3af" />
    <rect x="345" y="170" width="110" height="50" rx="8" fill="#fcd34d" opacity="0.9" />
    <rect x="385" y="230" width="30" height="20" fill="#6b7280" />
    
    <!-- Dials and Buttons -->
    <rect x="280" y="220" width="50" height="30" rx="10" fill="#4b5563" />
    <circle cx="500" cy="220" r="18" fill="#ef4444" />
    
    <!-- Film Reels / Decor -->
    <circle cx="320" cy="200" r="45" fill="none" stroke="url(#grad1)" stroke-width="12" opacity="0.5" />
    <circle cx="480" cy="200" r="45" fill="none" stroke="url(#grad1)" stroke-width="12" opacity="0.5" />
  </g>
</svg>
